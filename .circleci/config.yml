version: 2.1
orbs:
  architect: giantswarm/architect@8.0.2

workflows:
  build:
    jobs:
    - architect/go-build:
        matrix:
          parameters:
            architecture: ["linux/amd64", "linux/arm64"]
        name: go-build-net-exporter-<<matrix.architecture>>
        binary: net-exporter
        filters:
            # Trigger the job also on git tag.
          tags:
            only: /^v.*/

    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        multiarch: true
        requires:
        - go-build-net-exporter-linux/amd64
        - go-build-net-exporter-linux/arm64
        filters:
          tags:
            only: /^v.*/

          branches:
            ignore:
            - main
            - master
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-net-exporter-to-control-plane-app-catalog
        app_catalog: control-plane-catalog
        app_catalog_test: control-plane-test-catalog
        chart: net-exporter
        requires:
        - push-to-registries
        filters:
          tags:
            only: /^v.*/

          branches:
            ignore:
            - main
            - master
    - architect/push-to-app-catalog:
        executor: app-build-suite
        context: architect
        name: push-net-exporter-to-default-app-catalog
        app_catalog: default-catalog
        app_catalog_test: default-test-catalog
        chart: net-exporter
        requires:
        - push-to-registries
        filters:
          tags:
            only: /^v.*/

          branches:
            ignore:
            - main
            - master
